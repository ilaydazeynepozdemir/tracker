kind = "mobile"
previewPath = "/mobile/"
title = "Su Takip Mobile"
version = "1.0.0"
id = "artifacts/su-takip-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 19969

[services.development]
run = "pnpm --filter @workspace/su-takip-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/su-takip-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/su-takip-mobile", "run", "serve" ]

[services.env]
PORT = "19969"
BASE_PATH = "/mobile/"
